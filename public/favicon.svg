<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
  <!-- Blue circle -->
  <circle cx="180" cy="256" r="100" fill="url(#blue)" filter="url(#shadow)" opacity="0.95"/>
  <!-- Red circle -->
  <circle cx="332" cy="256" r="100" fill="url(#red)" filter="url(#shadow)" opacity="0.95"/>
  <!-- Rope -->
  <line x1="90" y1="256" x2="422" y2="256" stroke="#92400E" stroke-width="14" stroke-linecap="round" filter="url(#shadow)"/>
  <line x1="90" y1="256" x2="422" y2="256" stroke="#B45309" stroke-width="10" stroke-linecap="round"/>
  <!-- Rope texture lines -->
  <line x1="120" y1="252" x2="130" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <line x1="160" y1="252" x2="170" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <line x1="200" y1="252" x2="210" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="252" x2="310" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <line x1="340" y1="252" x2="350" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <line x1="380" y1="252" x2="390" y2="260" stroke="#78350F" stroke-width="2" opacity="0.4"/>
  <!-- Center knot -->
  <circle cx="256" cy="256" r="20" fill="#FCD34D" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="14" fill="#FBBF24"/>
  <circle cx="256" cy="256" r="6" fill="#F59E0B"/>
  <!-- Math symbols -->
  <text x="180" y="272" text-anchor="middle" fill="white" font-size="72" font-weight="bold" font-family="system-ui" filter="url(#shadow)">+</text>
  <text x="332" y="272" text-anchor="middle" fill="white" font-size="64" font-weight="bold" font-family="system-ui" filter="url(#shadow)">&#x00D7;</text>
  <!-- Small decorative symbols -->
  <text x="118" y="190" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="28" font-weight="bold" font-family="system-ui">&#x2212;</text>
  <text x="394" y="190" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="28" font-weight="bold" font-family="system-ui">&#x00F7;</text>
  <text x="118" y="340" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="28" font-weight="bold" font-family="system-ui">=</text>
  <text x="394" y="340" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="28" font-weight="bold" font-family="system-ui">&#x03C0;</text>
</svg>
